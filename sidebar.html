<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoBait</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f9f9fb;
      --text: #15141a;
      --text-muted: #6b6b78;
      --border: #e7e7ee;
      --accent: #6c47ff;
      --accent-hover: #5835db;
      --error: #ef4444;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1b22;
        --surface: #2b2a33;
        --text: #fbfbfe;
        --text-muted: #b5b5c0;
        --border: #3a3945;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.45;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .refresh-btn:hover {
      background: var(--surface);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .source-line {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      word-break: break-all;
    }

    .source-line strong {
      color: var(--text);
      font-weight: 600;
    }

    .results {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty,
    .error,
    .loading {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .error {
      color: var(--error);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .card-source {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .card-headline {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .card-headline:hover {
      color: var(--accent);
    }

    .card-summary {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .card-summary.placeholder {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .card-summary.error {
      color: var(--error);
      text-align: left;
      padding: 8px 10px;
    }

    .spinner {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: nobait-spin 0.7s linear infinite;
    }

    @keyframes nobait-spin {
      to { transform: rotate(360deg); }
    }

    .fallback-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }

    .fallback-btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 class="brand">NoBait</h1>
    <button type="button" id="refresh-btn" class="refresh-btn" title="Re-scan the active tab">Refresh</button>
  </header>

  <p class="source-line" id="source-line">Waiting for a page to scan&hellip;</p>

  <main class="results" id="results">
    <p class="loading">Open the extension popup and click <strong>Scrape this page</strong> to start.</p>
  </main>

  <script src="sidebar.js"></script>
</body>
</html>
