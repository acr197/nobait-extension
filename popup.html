<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>NoBait</h1>
    <p class="tagline">See through clickbait instantly.</p>

    <div class="section">
      <h2>How to use</h2>
      <p>Trigger NoBait on any news article link:</p>
      <ul class="trigger-list">
        <li><strong>Long-click</strong> &mdash; hold ~1s on a link</li>
        <li><strong>Shift + Click</strong> &mdash; on a link</li>
        <li><strong>Ctrl + Click</strong> &mdash; on a link</li>
      </ul>
      <p class="hint">Works on news articles. Social media, video, and shopping links are ignored.</p>
    </div>
  </div>
  <script src="popup-settings.js"></script>
</body>
</html>
