<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    :root {
      --bg: #f9f9fb;
      --surface: #ffffff;
      --text: #15141a;
      --text-muted: #5b5b66;
      --border: #e7e7ee;
      --accent: #6c47ff;
      --accent-hover: #5835db;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1b22;
        --surface: #2b2a33;
        --text: #fbfbfe;
        --text-muted: #b5b5c0;
        --border: #3a3945;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .tagline {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    .search {
      display: flex;
      gap: 8px;
      max-width: 560px;
      margin: 0 auto 56px;
    }

    .search input {
      flex: 1;
      padding: 14px 18px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 71, 255, 0.15);
    }

    .search button {
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .search button:hover {
      background: var(--accent-hover);
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .feed-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      padding: 16px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .feed-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .ds-card-link {
      display: block;
      flex: 1;
      text-decoration: none;
      color: inherit;
    }

    .feed-card-source {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .feed-card:hover .title {
      color: var(--accent);
    }

    .feed-card-hint {
      display: block;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .status-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .footer-hint {
      margin-top: 48px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-hint kbd {
      display: inline-block;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="layout">
    <header class="header">
      <h1 class="brand">NoBait</h1>
      <p class="tagline">See through clickbait instantly.</p>
    </header>

    <form id="search-form" class="search" role="search">
      <input
        type="search"
        id="search-input"
        placeholder="Search the web"
        autocomplete="off"
        spellcheck="false"
        autofocus
      >
      <button type="submit">Search</button>
    </form>

    <section class="feed" aria-labelledby="feed-heading">
      <h2 id="feed-heading" class="section-title">Popular Today</h2>
      <div class="feed-grid" id="feed-grid">
        <p class="status-message">Loading headlines&hellip;</p>
      </div>
    </section>

    <p class="footer-hint">
      Tip: long-click (hold <kbd>~1s</kbd>) or <kbd>Shift</kbd>+click any headline to see the real story.
    </p>
  </main>

  <script src="content.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
